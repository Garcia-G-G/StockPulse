services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockpulse_production
      POSTGRES_USER: stockpulse
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=1GB"
      - "-c"
      - "effective_cache_size=3GB"
      - "-c"
      - "maintenance_work_mem=256MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=26MB"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockpulse -d stockpulse_production"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - stockpulse_network

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - stockpulse_network

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://stockpulse:${POSTGRES_PASSWORD}@postgres:5432/stockpulse_production
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai_service:8001
      - WEB_CONCURRENCY=2
      - RAILS_MAX_THREADS=5
    ports:
      - "3000:3000"
    volumes:
      - ./log:/app/log
      - ./tmp:/app/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockpulse_network

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: bundle exec sidekiq -c 10 -v
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://stockpulse:${POSTGRES_PASSWORD}@postgres:5432/stockpulse_production
      - REDIS_URL=redis://redis:6379/0
      - AI_SERVICE_URL=http://ai_service:8001
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockpulse_network

  stream:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: bundle exec rake stream:start
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://stockpulse:${POSTGRES_PASSWORD}@postgres:5432/stockpulse_production
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockpulse_network

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: bundle exec rake telegram:bot:start
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - RAILS_ENV=production
      - DATABASE_URL=postgresql://stockpulse:${POSTGRES_PASSWORD}@postgres:5432/stockpulse_production
      - REDIS_URL=redis://redis:6379/0
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockpulse_network

  ai_service:
    build:
      context: ./ai_service
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=1
      - LOG_LEVEL=info
    env_file:
      - .env
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - stockpulse_network

  frontend:
    build:
      context: ./stockpulse-web
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://app:3000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://app:3000/cable
    ports:
      - "3001:3001"
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - stockpulse_network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl_params.conf:/etc/nginx/ssl_params.conf:ro
      - ./public:/app/public:ro
      - letsencrypt_data:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - stockpulse_network

  certbot:
    image: certbot/certbot:latest
    volumes:
      - letsencrypt_data:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    networks:
      - stockpulse_network

volumes:
  postgres_data:
  redis_data:
  letsencrypt_data:
  certbot_webroot:

networks:
  stockpulse_network:
    driver: bridge
