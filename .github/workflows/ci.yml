name: CI

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: RuboCop
        run: bundle exec rubocop --fail-level warning
      - name: Brakeman security scan
        run: bundle exec brakeman -q

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: stockpulse_test
          POSTGRES_USER: stockpulse
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U stockpulse"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      RAILS_ENV: test
      DATABASE_URL: postgresql://stockpulse:test_password@localhost:5432/stockpulse_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY_BASE: test_secret_key_base_for_ci_only

    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Setup database
        run: bin/rails db:create db:schema:load

      - name: Run unit tests
        run: bundle exec rspec spec/models spec/services spec/clients --format progress

      - name: Run integration tests
        run: bundle exec rspec spec/requests spec/jobs --format progress

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Rails Docker image
        run: docker build -f docker/Dockerfile .
      - name: Build AI service Docker image
        run: docker build -f ai_service/Dockerfile ai_service/
